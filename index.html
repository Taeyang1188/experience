<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXPERIENCE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#050506;font-family:'Pretendard',sans-serif;overflow:hidden;color:#e8e3d8}
  #frame{position:fixed;inset:0;width:100%;height:100%;border:none;background:#050506;z-index:1}
  .cover{position:fixed;inset:0;z-index:100;background:#050506;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;transition:opacity 1s ease}
  .cover.gone{opacity:0;pointer-events:none}
  .cover h1{font-family:'Space Mono',monospace;color:#e8e3d8;font-weight:700;font-size:clamp(34px,8vw,86px);letter-spacing:.18em;white-space:nowrap;text-align:center}
  .chapters{display:flex;flex-direction:column;gap:16px;margin-top:4px;width:min(420px,82vw)}
  .chap{width:100%;text-align:left;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.16);color:#c8c4bc;font-size:18px;font-weight:600;letter-spacing:.04em;padding:17px 24px;border-radius:14px;cursor:pointer;transition:background .2s,border-color .2s,transform .15s}
  .chap:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.4);transform:translateY(-2px)}
  .chap .idx{display:block;font-family:'Space Mono',monospace;font-size:12px;color:#7bff9e;margin-bottom:7px;letter-spacing:.12em}
  .chap .chap-label{display:block}
  .topnav{position:fixed;top:0;left:0;right:0;z-index:90;display:flex;align-items:center;gap:14px;padding:10px 16px;background:linear-gradient(180deg,rgba(5,5,6,.72),transparent);opacity:0;pointer-events:none;transition:opacity .4s}
  .topnav.show{opacity:1;pointer-events:auto}
  .nav-home{background:rgba(20,20,24,.74);border:1px solid rgba(255,255,255,.18);color:#c8c4bc;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;padding:7px 14px;border-radius:8px;cursor:pointer}
  .nav-home:hover{background:rgba(40,40,48,.86)}
  .nav-title{color:#6f6c66;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em}
  .fade{position:fixed;inset:0;z-index:95;background:#000;opacity:0;pointer-events:none;transition:opacity .8s ease}
  .fade.on{opacity:1}
  .cover-lang{position:fixed;top:18px;right:20px;z-index:200;display:flex;border:1px solid rgba(255,255,255,.18);border-radius:999px;overflow:hidden;font-family:'Space Mono',monospace;font-size:12px;transition:opacity .4s;background:rgba(20,20,24,.45);backdrop-filter:blur(4px)}
  .cover-lang button{background:transparent;color:#6f6c66;border:none;padding:6px 14px;cursor:pointer;letter-spacing:.1em;transition:background .2s,color .2s}
  .cover-lang button.active{background:#e8e3d8;color:#111;font-weight:700}
  @media(max-width:640px){
    .cover h1{letter-spacing:.1em;font-size:clamp(32px,11vw,58px)}
    .chap{font-size:16px}
  }
</style>
</head>
<body>
<iframe id="frame" title="chapter"></iframe>

<div class="topnav" id="topnav">
  <button class="nav-home" id="navHome">&#9665; <span id="homeText">목차</span></button>
  <span class="nav-title" id="navTitle"></span>
</div>

<div class="fade" id="fade"></div>

<div class="cover" id="cover">
  <div class="cover-lang" id="coverLang">
    <button id="coverBtnKO" class="active">KO</button>
    <button id="coverBtnEN">EN</button>
  </div>
  <h1 id="coverTitle">EXPERIENCE</h1>
  <div class="chapters">
    <div class="chap" data-key="curator">
      <span class="idx"></span>
      <span class="chap-label"></span>
    </div>
    <div class="chap" data-key="killer">
      <span class="idx"></span>
      <span class="chap-label"></span>
    </div>
    <div class="chap" data-key="otaku">
      <span class="idx"></span>
      <span class="chap-label"></span>
    </div>
  </div>
</div>

<script>
const CHAPTERS = {
  curator: 'curator.html',
  // 파일명은 기존 제작 과정에서 서로 바뀌어 있었으므로, 목차의 의미에 맞춰 연결한다.
  // 챕터 2 · 꿈  -> 살인범/꿈 섹션(otaku.html)
  // 챕터 3 · 시선 -> 오타쿠/시선 섹션(killer.html)
  killer: 'otaku.html',
  otaku: 'killer.html'
};

const LABELS = {
  ko: {
    home: '목차',
    nav: {
      curator: '챕터 1 · 전시회',
      killer: '챕터 2 · 꿈',
      otaku: '챕터 3 · 시선'
    },
    chapters: {
      curator: { idx: '챕터 1', label: '1. 전시회' },
      killer: { idx: '챕터 2', label: '2. 꿈' },
      otaku: { idx: '챕터 3', label: '3. 시선' }
    }
  },
  en: {
    home: 'INDEX',
    nav: {
      curator: 'CHAPTER 1 · Exhibition',
      killer: 'CHAPTER 2 · Dream',
      otaku: 'CHAPTER 3 · Gaze'
    },
    chapters: {
      curator: { idx: 'CHAPTER 1', label: '1. Exhibition' },
      killer: { idx: 'CHAPTER 2', label: '2. Dream' },
      otaku: { idx: 'CHAPTER 3', label: '3. Gaze' }
    }
  }
};

const frame = document.getElementById('frame');
const cover = document.getElementById('cover');
const fade = document.getElementById('fade');
const topnav = document.getElementById('topnav');
const navTitle = document.getElementById('navTitle');
const homeText = document.getElementById('homeText');
const btnKO = document.getElementById('coverBtnKO');
const btnEN = document.getElementById('coverBtnEN');

let lang = 'ko';
let currentChapter = null;

try {
  const saved = localStorage.getItem('experience_lang');
  if (saved === 'ko' || saved === 'en') lang = saved;
} catch(e) {}

function applyLang(nextLang) {
  lang = nextLang || lang;
  try {
    localStorage.setItem('experience_lang', lang);
    localStorage.setItem('lang', lang); // 하위 챕터 구버전 호환
  } catch(e) {}

  btnKO.classList.toggle('active', lang === 'ko');
  btnEN.classList.toggle('active', lang === 'en');
  homeText.textContent = LABELS[lang].home;

  document.querySelectorAll('.chap').forEach(chap => {
    const key = chap.dataset.key;
    chap.querySelector('.idx').textContent = LABELS[lang].chapters[key].idx;
    chap.querySelector('.chap-label').textContent = LABELS[lang].chapters[key].label;
  });

  if (currentChapter) navTitle.textContent = LABELS[lang].nav[currentChapter];

  if (frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'setLang', lang }, '*');
  }
}

function openChapter(key) {
  if (!CHAPTERS[key]) return;
  currentChapter = key;
  fade.classList.add('on');
  setTimeout(() => {
    frame.src = CHAPTERS[key];
    navTitle.textContent = LABELS[lang].nav[key];
    cover.classList.add('gone');
    topnav.classList.add('show');
    setTimeout(() => fade.classList.remove('on'), 450);
  }, 450);
}

function goHome() {
  fade.classList.add('on');
  setTimeout(() => {
    frame.removeAttribute('src');
    currentChapter = null;
    navTitle.textContent = '';
    topnav.classList.remove('show');
    cover.classList.remove('gone');
    setTimeout(() => fade.classList.remove('on'), 450);
  }, 450);
}

document.querySelectorAll('.chap').forEach(chap => {
  chap.addEventListener('click', () => openChapter(chap.dataset.key));
});
document.getElementById('navHome').addEventListener('click', goHome);
btnKO.addEventListener('click', () => applyLang('ko'));
btnEN.addEventListener('click', () => applyLang('en'));

frame.addEventListener('load', () => {
  if (frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'setLang', lang }, '*');
  }
});

window.addEventListener('message', (e) => {
  if (!e.data) return;
  if (e.data.type === 'nextChapter' && e.data.to) {
    if (e.data.to === 'home') goHome();
    else openChapter(e.data.to);
  }
  if (e.data.type === 'home') goHome();
  if (e.data.type === 'requestLang') {
    if (frame.contentWindow) frame.contentWindow.postMessage({ type: 'setLang', lang }, '*');
  }
  if (e.data.type === 'updateLang' && (e.data.lang === 'ko' || e.data.lang === 'en')) {
    applyLang(e.data.lang);
  }
});

applyLang(lang);
</script>
</body>
</html>
